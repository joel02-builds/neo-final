<svg viewBox="0 0 340 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neo Wal-Maskottchen">
  <defs>

    <!-- Hauptkörper: helles Beige-Grau oben-links → fast-schwarz Mitte-rechts -->
    <radialGradient id="bg1" cx="26%" cy="24%" r="78%">
      <stop offset="0%"   stop-color="#cac6b8"/>
      <stop offset="18%"  stop-color="#a8a498"/>
      <stop offset="38%"  stop-color="#6a6860"/>
      <stop offset="58%"  stop-color="#323230"/>
      <stop offset="78%"  stop-color="#1c1c1a"/>
      <stop offset="100%" stop-color="#101010"/>
    </radialGradient>

    <!-- Zweiter dunkler Fleck Mitte-rechts (Steinmakel) -->
    <radialGradient id="bg2" cx="65%" cy="55%" r="52%">
      <stop offset="0%"   stop-color="#0c0c0a" stop-opacity="0.92"/>
      <stop offset="45%"  stop-color="#1a1a18" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#1a1a18" stop-opacity="0"/>
    </radialGradient>

    <!-- Glasartiger Spiegelglanz oben-links -->
    <radialGradient id="spec" cx="22%" cy="20%" r="38%">
      <stop offset="0%"   stop-color="#e8e4d8" stop-opacity="0.72"/>
      <stop offset="60%"  stop-color="#d0ccbe" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d0ccbe" stop-opacity="0"/>
    </radialGradient>

    <!-- Beige-Aufhellung rechts-oben (zweiter heller Steinfleck) -->
    <radialGradient id="patch" cx="70%" cy="28%" r="30%">
      <stop offset="0%"   stop-color="#b8b4a4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b8b4a4" stop-opacity="0"/>
    </radialGradient>

    <!-- Auge -->
    <radialGradient id="eye" cx="33%" cy="30%" r="62%">
      <stop offset="0%"   stop-color="#1e1e1c"/>
      <stop offset="100%" stop-color="#030303"/>
    </radialGradient>

    <!-- Flipper -->
    <radialGradient id="flip" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#7a7870"/>
      <stop offset="100%" stop-color="#282826"/>
    </radialGradient>

    <!-- Nubs -->
    <radialGradient id="nub" cx="50%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#6a6860"/>
      <stop offset="100%" stop-color="#1e1e1c"/>
    </radialGradient>

    <!-- Schatten unter Körper -->
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Weicher Glow um Auge -->
    <filter id="eyeglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>

  <!-- Boden-Schatten -->
  <ellipse cx="168" cy="196" rx="148" ry="11" fill="url(#shadow)"/>

  <!-- ── HAUPTKÖRPER — sehr runder kompakter Pebble ── -->
  <!--  Breites flaches Oval, front links leicht spitz, hinten rund  -->
  <path d="
    M 42 112
    C 38  70, 68  38, 118  32
    C 165  26, 225  30, 265  52
    C 305  72, 315 108, 300 138
    C 285 168, 248 182, 200 186
    C 152 190, 100 182,  72 165
    C 44  148,  46 154,  42 112
    Z"
    fill="url(#bg1)"/>

  <!-- Dunkler Steinmakel Mitte-rechts -->
  <ellipse cx="218" cy="118" rx="105" ry="72" fill="url(#bg2)"/>

  <!-- Heller Steinfleck oben rechts -->
  <ellipse cx="240" cy="68"  rx="60"  ry="35" fill="url(#patch)"/>

  <!-- Glasglanz oben links -->
  <ellipse cx="110" cy="72"  rx="82"  ry="58" fill="url(#spec)"/>

  <!-- ── Weiße Mineral-Adern (Quarz-Einschlüsse) ── -->
  <!-- Haupt-Ast zentral -->
  <path d="M188 95 Q208 83 232 88 Q250 78 268 84"
        stroke="#eae6de" stroke-width="2.8" fill="none" stroke-linecap="round" opacity="0.88"/>
  <!-- Zweig nach oben -->
  <path d="M218 85 Q225 76 236 70"
        stroke="#e4e0d8" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.70"/>
  <!-- Zweig nach unten -->
  <path d="M232 88 Q238 98 248 102 Q258 95 268 98"
        stroke="#dedad2" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.65"/>
  <!-- Kurzer Ast rechts oben -->
  <path d="M254 80 Q262 73 272 70"
        stroke="#e0dcd4" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.55"/>
  <!-- Mittlere Ader -->
  <path d="M175 108 Q192 100 208 104 Q222 96 238 100"
        stroke="#d8d4cc" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.72"/>
  <!-- Ader links-mitte -->
  <path d="M142 78 Q162 68 185 74 Q175 62 158 58"
        stroke="#e0dcd4" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.60"/>
  <!-- Kleine Ader oben links -->
  <path d="M118 85 Q132 78 150 82"
        stroke="#dedad2" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.45"/>
  <!-- Kurze Ader rechts unten -->
  <path d="M252 118 Q265 112 278 116"
        stroke="#d0ccc4" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.52"/>

  <!-- ── LINKE SEITENFLOSSE (nach vorne unten zeigend) ── -->
  <ellipse cx="80" cy="155" rx="42" ry="16"
           fill="url(#flip)" transform="rotate(-30 80 155)" opacity="0.95"/>
  <!-- Flosse Kontur / Tiefe -->
  <ellipse cx="82" cy="157" rx="40" ry="14"
           fill="none" stroke="#181816" stroke-width="1.5" transform="rotate(-30 82 157)" opacity="0.4"/>

  <!-- ── DREI NUBS AM BODEN ── -->
  <ellipse cx="118" cy="185" rx="20" ry="9" fill="url(#nub)" transform="rotate(-12 118 185)"/>
  <ellipse cx="162" cy="189" rx="18" ry="8" fill="url(#nub)" transform="rotate(-2  162 189)"/>
  <ellipse cx="204" cy="186" rx="16" ry="7" fill="url(#nub)" transform="rotate(10  204 186)"/>

  <!-- ── AUGE — großes rundes Glas-Auge ── -->
  <!-- Äußere dunkle Fassung -->
  <circle cx="88" cy="108" r="26" fill="#0c0c0a" opacity="0.85"/>
  <!-- Haupt-Augapfel -->
  <circle cx="88" cy="108" r="23" fill="url(#eye)" filter="url(#eyeglow)"/>
  <!-- Prominenter weißer Glanzpunkt (obere Hälfte, links) -->
  <circle cx="76" cy="97"  r="8.5" fill="#ffffff" opacity="0.96"/>
  <!-- Zweiter kleiner Glanzpunkt -->
  <circle cx="97" cy="114" r="3"   fill="#ffffff" opacity="0.30"/>

  <!-- ── LÄCHELN ── -->
  <path d="M42 122 Q54 132 68 128"
        stroke="#585654" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.80"/>
  <!-- Mund (leichter Spalt) -->
  <path d="M22 118 Q34 115 44 118"
        stroke="#484644" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.55"/>

  <!-- ── BLINK-ANIMATION ID ── -->
  <g id="whale-eyelid" opacity="0">
    <ellipse cx="88" cy="96" rx="23" ry="23" fill="#0c0c0a"/>
  </g>

</svg>
